<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }
            h2, h3, h4, h5, h6, h7, label, p, option, button {
                font-family: Arial, sans-serif;
            }
            select, button {
                padding: 8px;
                margin: 5px 0;
            }
            button {
                background-color: #4CAF50;
                color: white;
                border: none;
                cursor: pointer;
            }
            button:hover {
                background-color: #45a049;
            }   
        </style>
    </head>
    <body>
        <h2> Dashboard - User</h2>

        <form method="POST">
            <label> Choose attribute 1:</label>
            <select name="State">
                <option value="AL">AL</option>
                <option value="AR">AR</option>
                <option value="AZ">AZ</option>
                <option value="CA">CA</option>
                <option value="CO">CO</option>
                <option value="CT">CT</option>
                <option value="DC">DC</option>
                <option value="DE">DE</option>
                <option value="FL">FL</option>
                <option value="GA">GA</option>
                <option value="HI">HI</option>
                <option value="IA">IA</option>
                <option value="ID">ID</option>
                <option value="IL">IL</option>
                <option value="IN">IN</option>
                <option value="KS">KS</option>
                <option value="KY">KY</option>
                <option value="LA">LA</option>
                <option value="MA">MA</option>
                <option value="MD">MD</option>
                <option value="ME">ME</option>
                <option value="MI">MI</option>
                <option value="MN">MN</option>
                <option value="MO">MO</option>
                <option value="MS">MS</option>
                <option value="MT">MT</option>
                <option value="NC">NC</option>
                <option value="NE">NE</option>
                <option value="NJ">NJ</option>
                <option value="NV">NV</option>
                <option value="NY">NY</option>
                <option value="OH">OH</option>
                <option value="OK">OK</option>
                <option value="OR">OR</option>
                <option value="PA">PA</option>
                <option value="PR">PR</option>
                <option value="SC">SC</option>
                <option value="SD">SD</option>
                <option value="TN">TN</option>
                <option value="TX">TX</option>
                <option value="UT">UT</option>
                <option value="VA">VA</option>
                <option value="WA">WA</option>
                <option value="WI">WI</option>

            </select>
            <label> Choose attribute 2:</label>
            <select name="Patient type">
                <option value="Patients using donor eggs/embryos">Patients using donor eggs/embryos</option>
                <option value="Patients using their own eggs">Patients using their own eggs</option>
                <option value="Patients with no prior ART using their own eggs">Patients with no prior ART using their own eggs</option>
            </select>
            <label> Choose attribute 3: </label>
            <select name = "Breakout">
                <option Value="&lt;35"> &lt;35 </option>
                <option Value="35-37">35-37</option>
                <option Value="38-40">38-40</option>
                <option Value="&gt;40"> &gt;40 </option>
            </select>

            <button type="submit">Submit</button>
        </form>

        {% if result %}
        <h3>Result:</h3>
        {% if result > 70.0 %}
        <div style="background-color: red; color: white; padding: 10px; display: inline-block;">{{ result }}</div>
        {% elif result > 15.0 %}
        <div style="background-color: yellow; padding: 10px; display: inline-block;">{{ result }}</div>
        {% else %}
        <div style="background-color: green; color: white; padding: 10px; display: inline-block;">{{ result }}</div>
        {% endif %}
        <h5>Location:</h5>
        <p>{{ location }}</p>
        <h6>Type:</h6>
        <p>{{ type }}</p>
        <h7>Age:</h7>
        <p>{{ breakout }}</p>
        <h4>Description:</h4>
        <p>{{ description }}</p>
        {% endif%}
    </body>
</html>
